<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register - Banking App</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .register-card {
            background: white;
            border-radius: 15px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.1);
            padding: 40px;
            max-width: 500px;
            width: 100%;
        }
        .register-header {
            text-align: center;
            margin-bottom: 30px;
        }
        .register-header h2 {
            color: #333;
            font-weight: 600;
        }
        .register-header p {
            color: #666;
        }
        .btn-register {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border: none;
            color: white;
            padding: 12px;
            width: 100%;
            border-radius: 8px;
            font-weight: 600;
            transition: transform 0.3s;
        }
        .btn-register:hover {
            transform: translateY(-2px);
            color: white;
        }
        .form-control {
            border-radius: 8px;
            padding: 12px;
            border: 1px solid #ddd;
        }
        .form-control:focus {
            border-color: #667eea;
            box-shadow: 0 0 0 0.2rem rgba(102,126,234,0.25);
        }
        .alert {
            border-radius: 8px;
        }
        html {
    position: relative;
    min-height: 100%;
}
body {
    margin-bottom: 60px;
}
.footer {
    position: absolute;
    bottom: 0;
    width: 100%;
    height: 60px;
    line-height: 60px;
    background-color: #f5f5f5;
    text-align: center;
    border-top: 1px solid #dee2e6;
}
.copyright {
    color: #6c757d;
    font-size: 0.9rem;
}
.copyright i {
    color: #dc3545;
}
    </style>
</head>
<body>
    <div class="register-card">
        <div class="register-header">
            <h2>Create Account</h2>
            <p>Join us to start banking</p>
        </div>

        <!-- Success Message -->
        <div th:if="${message}" class="alert alert-success alert-dismissible fade show" role="alert">
            <i class="bi bi-check-circle"></i> <span th:text="${message}"></span>
            <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
        </div>

        <!-- Registration Form -->
        <form th:action="@{/register}" th:object="${user}" method="post">
            <div class="mb-3">
                <label class="form-label">Full Name</label>
                <input type="text" class="form-control" th:field="*{name}" placeholder="Enter your full name" required>
            </div>

            <div class="mb-3">
                <label class="form-label">Email</label>
                <input type="email" class="form-control" th:field="*{email}" placeholder="Enter your email" required>
            </div>

            <div class="mb-3">
                <label class="form-label">Username</label>
                <input type="text" class="form-control" th:field="*{username}" placeholder="Choose a username" required>
            </div>

            <div class="mb-3">
                <label class="form-label">Password</label>
                <input type="password" class="form-control" th:field="*{password}" placeholder="Create a password" required>
            </div>

            <div class="mb-3">
                <label class="form-label">Phone Number</label>
                <input type="tel" class="form-control" th:field="*{phoneNumber}" placeholder="Enter your phone number">
            </div>

            <div class="mb-4">
                <label class="form-label">Address</label>
                <textarea class="form-control" th:field="*{address}" rows="2" placeholder="Enter your address"></textarea>
            </div>

            <button type="submit" class="btn btn-register">Register</button>
        </form>

        <div class="text-center mt-4">
            <p>Already have an account? <a th:href="@{/login}" style="color: #667eea;">Login here</a></p>
        </div>
    </div>
    <!-- Footer -->
    <footer class="footer">
        <div class="container">
            <span class="copyright">
                <i class="bi bi-c-circle"></i> <span th:text="${#dates.year(#dates.createNow())}">2026</span> 
                Developed with <i class="bi bi-heart-fill"></i> by Suyog Kulkarni. All rights reserved.
            </span>
        </div>
    </footer>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
